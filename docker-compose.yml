services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    env_file:
      - ./services/auth-service/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:3001"

  catalog-service:
    build: ./services/catalog-service
    restart: unless-stopped
    env_file:
      - ./services/catalog-service/.env
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:3002"

  reservation-service:
    build: ./services/reservation-service
    restart: unless-stopped
    env_file:
      - ./services/reservation-service/.env
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:3003"

  payment-service:
    build: ./services/payment-service
    restart: unless-stopped
    env_file:
      - ./services/payment-service/.env
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:3004"

  review-service:
    build: ./services/review-service
    restart: unless-stopped
    env_file:
      - ./services/review-service/.env
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py makemigrations && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:3005"

volumes:
  pgdata: